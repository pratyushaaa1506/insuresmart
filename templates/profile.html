<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body{

            background:#f1f5f9;
            font-family:Arial,sans-serif;

        }

        .navbar{

            background:#0f172a;
            padding:20px;

        }

        .navbar-brand{

            color:white;
            font-size:30px;
            font-weight:bold;

        }

        .profile-card{

            background:white;
            border-radius:25px;
            padding:50px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.08);

        }

        .avatar{

            width:120px;
            height:120px;
            border-radius:50%;
            background:linear-gradient(135deg,#2563eb,#06b6d4);
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:50px;
            color:white;
            margin:auto;

        }

        .profile-title{

            font-size:40px;
            font-weight:bold;
            margin-top:25px;

        }

        .email{

            color:gray;
            font-size:20px;
            margin-top:10px;

        }

        .stat-box{

            background:#eff6ff;
            border-radius:18px;
            padding:25px;
            text-align:center;

        }

        .stat-box h3{

            color:#2563eb;
            font-size:35px;
            font-weight:bold;

        }

        .stat-box p{

            color:gray;

        }

    </style>

</head>

<body>

<nav class="navbar">

    <div class="container">

        <a class="navbar-brand">
            InsureSmart AI
        </a>

        <a href="/dashboard"
           class="btn btn-light">

           Dashboard

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="profile-card text-center">

                <div class="avatar">

                    <i class="fa-solid fa-user"></i>

                </div>

                <div class="profile-title">

                    User Profile

                </div>

                <div class="email">

                    {{ user.email }}

                </div>

                <div class="row mt-5">

                    <div class="col-md-4 mb-3">

                        <div class="stat-box">

                            <h3>12</h3>

                            <p>
                                Predictions Made
                            </p>

                        </div>

                    </div>

                    <div class="col-md-4 mb-3">

                        <div class="stat-box">

                            <h3>8</h3>

                            <p>
                                Plans Compared
                            </p>

                        </div>

                    </div>

                    <div class="col-md-4 mb-3">

                        <div class="stat-box">

                            <h3>4.8</h3>

                            <p>
                                User Rating
                            </p>

                        </div>

                    </div>

                </div>

                <a href="/logout"
                   class="btn btn-danger mt-5">

                   Logout

                </a>

            </div>

        </div>

    </div>

</div>

<script
src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js">
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Insurance Plans</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body{
            background:#f1f5f9;
            font-family:Arial,sans-serif;
        }

        .navbar{

            background:#0f172a;
            padding:20px;

        }

        .navbar-brand{

            color:white;
            font-size:30px;
            font-weight:bold;

        }

        .page-title{

            font-size:45px;
            font-weight:bold;
            margin-bottom:40px;

        }

        .plan-card{

            background:white;
            border-radius:20px;
            padding:25px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.08);
            transition:0.3s;
            height:100%;

        }

        .plan-card:hover{

            transform:translateY(-5px);

        }

        .logo{

            height:60px;
            object-fit:contain;
            margin-bottom:20px;

        }

        .price{

            font-size:30px;
            font-weight:bold;
            color:#2563eb;

        }

        .visit-btn{

            background:#2563eb;
            color:white;
            border:none;
            border-radius:12px;
            padding:12px 20px;
            text-decoration:none;
            display:inline-block;
            margin-top:15px;

        }

        .visit-btn:hover{

            background:#1d4ed8;
            color:white;

        }

    </style>

</head>

<body>

<nav class="navbar">

    <div class="container">

        <a class="navbar-brand">
            InsureSmart AI
        </a>

        <a href="/dashboard"
           class="btn btn-light">

           Dashboard

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="page-title">

        Explore Insurance Plans

    </div>

    <div class="row">

        {% for plan in plans %}

        <div class="col-md-3 mb-4">

            <div class="plan-card">

                <img
                    src="{{ plan.logo }}"
                    class="logo">

                <h4>
                    {{ plan.name }}
                </h4>

                <div class="price mt-3">

                    {{ plan.price }}

                </div>

                <p class="mt-3">

                    <strong>Coverage:</strong>
                    {{ plan.coverage }}

                </p>

                <p>

                    ⭐ {{ plan.rating }}

                </p>

                <a href="{{ plan.website }}"
                   target="_blank"
                   class="visit-btn">

                   Visit Website

                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - InsureSmart AI</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            background: linear-gradient(135deg,#020617,#1e3a8a,#0ea5e9);
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
        }

        .register-box{

            width:950px;
            height:600px;
            background:white;
            border-radius:25px;
            overflow:hidden;
            display:flex;
            box-shadow:0px 10px 30px rgba(0,0,0,0.3);

        }

        .left{

            flex:1;
            background: linear-gradient(135deg,#2563eb,#06b6d4);
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:40px;

        }

        .left h1{
            font-size:45px;
            font-weight:bold;
        }

        .left p{
            margin-top:20px;
            text-align:center;
            font-size:18px;
        }

        .right{

            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;

        }

        .form-box{
            width:100%;
            max-width:350px;
        }

        .form-control{
            height:50px;
            border-radius:12px;
        }

        .btn-register{

            background:#2563eb;
            color:white;
            border:none;
            height:50px;
            border-radius:12px;
            width:100%;
            font-weight:bold;

        }

        .btn-register:hover{
            background:#1d4ed8;
        }

        .login-link{
            margin-top:15px;
            text-align:center;
        }

    </style>

</head>

<body>

<div class="register-box">

    <div class="left">

        <h1>Create Account</h1>

        <p>
            Join InsureSmart AI and discover personalized Indian health insurance recommendations.
        </p>

    </div>

    <div class="right">

        <div class="form-box">

            <h2 class="text-center mb-4">
                Register
            </h2>

            <form method="POST">

                <div class="mb-3">

                    <input type="email"
                           class="form-control"
                           name="email"
                           placeholder="Enter Email"
                           required>

                </div>

                <div class="mb-3">

                    <input type="password"
                           class="form-control"
                           name="password"
                           placeholder="Create Password"
                           required>

                </div>

                <button class="btn-register">
                    Create Account
                </button>

            </form>

            <div class="login-link">

                Already have an account?

                <a href="/">
                    Login
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
